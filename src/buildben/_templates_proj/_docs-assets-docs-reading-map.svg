<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">{my_project} documentation reading map</title>
  <desc id="desc">The root README points to the docs index, which points to how-to guides, development notes, references, and explanations.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666666" />
    </marker>
    <style>
      text { font-family: sans-serif; fill: #000000; }
      .title { font-size: 20px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 13px; }
      .box { fill: #f4f4f4dd; stroke: #666666; stroke-width: 2; rx: 8; }
      .line { stroke: #666666; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="28" y="18" width="420" height="40" fill="#f4f4f4dd" stroke="#666666" stroke-width="1.5" rx="8" />
  <text class="title" x="40" y="44">{my_project} Documentation Map</text>
  <rect class="box" x="60" y="92" width="180" height="88" />
  <text class="label" x="88" y="128">Root README</text>
  <text class="small" x="86" y="154">Short entry point</text>
  <rect class="box" x="400" y="92" width="180" height="88" />
  <text class="label" x="430" y="128">docs/README</text>
  <text class="small" x="428" y="154">Navigation rules</text>
  <line class="line" x1="240" y1="136" x2="390" y2="136" />
  <rect class="box" x="90" y="248" width="170" height="70" />
  <text class="label" x="118" y="278">How-To</text>
  <text class="small" x="116" y="302">Task recipes</text>
  <rect class="box" x="305" y="248" width="170" height="70" />
  <text class="label" x="338" y="278">Development</text>
  <text class="small" x="336" y="302">Maintainer loop</text>
  <rect class="box" x="520" y="248" width="170" height="70" />
  <text class="label" x="558" y="278">References</text>
  <text class="small" x="554" y="302">Exact names</text>
  <rect class="box" x="735" y="248" width="170" height="70" />
  <text class="label" x="770" y="278">Explanations</text>
  <text class="small" x="762" y="302">System model</text>
  <line class="line" x1="458" y1="180" x2="198" y2="240" />
  <line class="line" x1="482" y1="180" x2="400" y2="240" />
  <line class="line" x1="508" y1="180" x2="590" y2="240" />
  <line class="line" x1="532" y1="180" x2="792" y2="240" />
</svg>
